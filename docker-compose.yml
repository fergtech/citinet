# Citinet Hub Stack
# This docker-compose file defines all services needed to run a Citinet hub.
# Prerequisites: Docker 20.10+, Docker Compose 2.0+
# Usage: docker-compose up -d

version: '3.8'

services:
  # Hub API Server
  citinet-api:
    image: ghcr.io/fergtech/citinet-api:latest
    container_name: citinet-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-9090}:9090"
    environment:
      - NODE_ENV=production
      - PORT=9090
      - HUB_NAME=${HUB_NAME}
      - HUB_SLUG=${HUB_SLUG}
      - HUB_LOCATION=${HUB_LOCATION}
      - HUB_DESCRIPTION=${HUB_DESCRIPTION}
      - HUB_VISIBILITY=${HUB_VISIBILITY:-public}
      - DATABASE_URL=postgresql://citinet:${DB_PASSWORD}@citinet-db:5432/citinet
      - STORAGE_URL=http://citinet-storage:9000
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-hub-files}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - TUNNEL_URL=${TUNNEL_URL:-}
    depends_on:
      citinet-db:
        condition: service_healthy
      citinet-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - citinet-network

  # PostgreSQL Database
  citinet-db:
    image: postgres:16-alpine
    container_name: citinet-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=citinet
      - POSTGRES_USER=citinet
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citinet -d citinet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - citinet-network

  # MinIO Object Storage (S3-compatible)
  citinet-storage:
    image: minio/minio:latest
    container_name: citinet-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY}
      - MINIO_BROWSER=${MINIO_BROWSER:-on}
    volumes:
      - ${DATA_DIR:-./data}/files:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s
    networks:
      - citinet-network

  # Redis (Sessions, caching)
  citinet-redis:
    image: redis:7-alpine
    container_name: citinet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - citinet-network

networks:
  citinet-network:
    driver: bridge
